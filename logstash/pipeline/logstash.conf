# ─────────────────────────────────────────────────────────────
# Logstash Pipeline: MySQL → RabbitMQ
# ─────────────────────────────────────────────────────────────

input {
  jdbc {

    # # SQLite JDBC driver (downloaded in Dockerfile)
    # jdbc_driver_library    => "/usr/share/logstash/drivers/sqlite-jdbc.jar"
    # jdbc_driver_class      => "org.sqlite.JDBC"
    # jdbc_connection_string => "jdbc:sqlite:/data/orders.db"
    # jdbc_user              => ""
    # jdbc_password          => ""



    # MySQL Connector/J driver (downloaded in Dockerfile)
    jdbc_driver_library    => "/usr/share/logstash/drivers/mysql-connector-j.jar"
    jdbc_driver_class      => "com.mysql.cj.jdbc.Driver"
    jdbc_connection_string => "jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    jdbc_user              => "${MYSQL_USER}"
    jdbc_password          => "${MYSQL_PASS}"

    # Read all rows with id > last seen id (tracks state across restarts)
    statement => "
      SELECT
        id,
        customer_name,
        customer_email,
        product,
        amount,
        status,
        created_at
      FROM orders
      WHERE id > :sql_last_value
      ORDER BY id ASC
    "

    use_column_value        => true
    tracking_column         => "id"
    tracking_column_type    => "numeric"
    last_run_metadata_path  => "/usr/share/logstash/data/.logstash_jdbc_last_run"

    # Poll every 30 seconds  (cron format: sec min hour day month weekday)
    schedule => "*/30 * * * * *"

    # Start fresh on first boot (picks up all rows since sql_last_value=0)
    clean_run => false

    jdbc_default_timezone => "UTC"
    jdbc_fetch_size       => 50
  }
}


filter {
  # Add a pipeline-processed timestamp
  mutate {
    add_field => {
      "pipeline_processed_at" => "%{@timestamp}"
    }
    remove_field => ["@version"]
    convert => {
      "amount" => "float"
      "id"     => "integer"
    }
  }
}


output {
  # ── Publish to RabbitMQ ───────────────────────────────────
  rabbitmq {
    host          => "${RABBITMQ_HOST}"
    port          => "${RABBITMQ_PORT}"
    user          => "${RABBITMQ_USER}"
    password      => "${RABBITMQ_PASS}"
    exchange      => "orders_exchange"
    exchange_type => "direct"
    key           => "order"
    durable       => true
    persistent    => true
    codec         => json
  }

  # ── Debug to stdout ──────────────────────────────────────
  stdout {
    codec => rubydebug
  }
}
