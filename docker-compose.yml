services:

  # ─────────────────────────────────────────────
  # 1. RabbitMQ Message Broker
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"       # AMQP
      - "15672:15672"     # Management UI  →  http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - pipeline_net



  # # ─────────────────────────────────────────────
  # #  DB Seeder  (one-shot: seeds SQLite then exits)
  # # ─────────────────────────────────────────────
  # db_seeder:
  #   build:
  #     context: ./db
  #     dockerfile: Dockerfile
  #   container_name: db_seeder
  #   volumes:
  #     - db_data:/data
  #   networks:
  #     - pipeline_net
  #   restart: "no"



  # ─────────────────────────────────────────────
  # 2. Logstash  (MySQL → RabbitMQ)
  # ─────────────────────────────────────────────
  logstash:
    build:
      context: ./logstash
      dockerfile: Dockerfile
    container_name: logstash
    extra_hosts:
      - "host-gateway:host-gateway"   # resolve host-gateway → host machine IP
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASS: ${MYSQL_PASS}
      MYSQL_DB:   ${MYSQL_DB}
      LS_JAVA_OPTS: "-Xms512m -Xmx512m"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - pipeline_net

  # ─────────────────────────────────────────────
  # 3. Python Consumer + FastAPI
  # ─────────────────────────────────────────────
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: consumer
    ports:
      - "8000:8000"     # FastAPI  →  http://localhost:8000
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TO: ${SMTP_TO}
      SMTP_APP_PASS: ${SMTP_APP_PASS}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - pipeline_net
    restart: unless-stopped

# ─────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────
volumes:
  # db_data:
  #   driver: local
  rabbitmq_data:
    driver: local

networks:
  pipeline_net:
    driver: bridge
